<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA Regression Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="nav-header">🧪 QA Hub</div>
        <div class="nav-items">
            <div class="nav-item active" onclick="switchView('run')">▶️ Run Tests</div>
            <div class="nav-item" onclick="switchView('suites')">📁 Manage Suites</div>
            <div class="nav-item" onclick="switchView('history')">🕰️ History</div>
            <div class="nav-item" onclick="switchView('settings')">⚙️ Settings</div>
        </div>
    </nav>

    <main>
        <div id="view-run" class="view active">
            <div id="suite-picker-section">
                <h2>Select a Suite to Test</h2>
                <div class="suite-grid" id="run-suite-grid"></div>
                <div id="run-empty-msg" class="empty-state hidden">
                    <p>No suites found. Go to "Manage Suites" to create or import one!</p>
                </div>
            </div>
            <div id="active-test-section" class="hidden">
                <h2><button class="btn-outline" onclick="showPicker()">⬅ Back</button> Testing: <span id="active-suite-name"></span></h2>
                <div class="card" id="test-container"></div>
                <button class="btn-primary" style="width: 100%; padding: 15px;" onclick="generateReport()">Generate & Save JIRA Report</button>
                <textarea id="jira-output" readonly></textarea>
            </div>
        </div>

        <div id="view-suites" class="view">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Test Suites</h2>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-primary" onclick="showSuiteEditor()">+ New Suite</button>
                    <button class="btn-outline" onclick="document.getElementById('import-suite-file').click()">📥 Import Suite</button>
                    <input type="file" id="import-suite-file" accept=".json" style="display: none;" onchange="importSingleSuite(event)">
                </div>
            </div>
            <div id="suite-list"></div>
            <div class="card" id="suite-editor" style="display: none;">
                <h3 id="editor-title" style="margin-bottom: 15px;">Suite Editor</h3>
                <input type="hidden" id="edit-suite-id">
                <input type="text" id="edit-suite-name" placeholder="Suite Name">
                <textarea id="edit-suite-tests" style="height: 250px;" placeholder="Enter tests here..."></textarea>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-primary" onclick="saveSuite()">Save Suite</button>
                    <button class="btn-outline" onclick="hideSuiteEditor()">Cancel</button>
                </div>
            </div>
        </div>

        <div id="view-history" class="view">
            <h2>Run History</h2>
            <div id="history-list"></div>
        </div>

        <div id="view-settings" class="view">
            <h2>Settings & Global Backup</h2>
            <div class="card">
                <h3>Export All Data</h3>
                <button class="btn-primary" onclick="exportData()">Download Global Backup (.json)</button>
            </div>
            <div class="card">
                <h3>Import Global Backup</h3>
                <input type="file" id="import-file" accept=".json" style="display: none;" onchange="importData(event)">
                <button class="btn-outline" onclick="document.getElementById('import-file').click()">Restore from File</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
