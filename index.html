<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QA Regression Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="nav-header">🧪 QA Hub</div>
        <div class="nav-item active" onclick="switchView('run')">▶️ Run Tests</div>
        <div class="nav-item" onclick="switchView('suites')">📁 Manage Suites</div>
        <div class="nav-item" onclick="switchView('history')">🕰️ History</div>
        <div class="nav-item" onclick="switchView('settings')">⚙️ Settings</div>
    </nav>

    <main>
        <div id="view-run" class="view active">
            <div id="suite-picker-section">
                <h2>Choose a Suite</h2>
                <div class="suite-grid" id="run-suite-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap:15px; margin-top:20px;"></div>
                <p id="run-empty-msg" class="hidden" style="margin-top:20px; color:#6b778c;">No suites created yet.</p>
            </div>
            <div id="active-test-section" class="hidden">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                    <h2><span id="active-suite-name"></span></h2>
                    <div>
                        <button class="btn-outline" onclick="showPicker()" style="margin-right:10px">Back</button>
                        <button class="btn-primary" onclick="generateReport()">Copy JIRA Report</button>
                    </div>
                </div>
                <div id="test-container"></div>
                <textarea id="jira-output" readonly></textarea>
            </div>
        </div>

        <div id="view-suites" class="view">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                <h2>Manage Suites</h2>
                <button class="btn-primary" onclick="showSuiteEditor()">+ New Suite</button>
            </div>
            <div id="suite-list"></div>
            <div class="card" id="suite-editor" style="display:none; margin-top:20px">
                <input type="text" id="edit-suite-name" class="editor-input" style="font-size:18px; font-weight:bold; margin-bottom:20px" placeholder="Suite Name">
                <input type="hidden" id="edit-suite-id">
                <div id="editor-items-list"></div>
                <div style="margin-top:20px; display:flex; justify-content:space-between">
                    <button class="btn-outline" onclick="addLine()">+ Add Step</button>
                    <div>
                        <button class="btn-primary" onclick="saveSuite()" style="margin-right:10px">Save Suite</button>
                        <button class="btn-outline" onclick="document.getElementById('suite-editor').style.display='none'">Cancel</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-history" class="view">
            <h2>History</h2>
            <div id="history-list"></div>
        </div>

        <div id="view-settings" class="view">
            <h2>Settings</h2>
            <div class="card" style="margin-top:20px">
                <h3>Backups</h3>
                <p style="margin:10px 0; font-size:14px; color:#6b778c">Backup your data to a local file.</p>
                <button class="btn-primary" onclick="exportData()" style="margin-right:10px">Export All</button>
                <button class="btn-outline" onclick="document.getElementById('import-file').click()">Import Backup</button>
                <input type="file" id="import-file" class="hidden" onchange="importData(event)">
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
