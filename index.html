<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA Regression Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="nav-header">🧪 QA Hub</div>
        <div class="nav-items">
            <div class="nav-item active" onclick="switchView('run')">▶️ Run Tests</div>
            <div class="nav-item" onclick="switchView('suites')">📁 Manage Suites</div>
            <div class="nav-item" onclick="switchView('history')">🕰️ History</div>
            <div class="nav-item" onclick="switchView('settings')">⚙️ Settings</div>
        </div>
    </nav>

    <main>
        <div id="view-run" class="view active">
            <div id="suite-picker-section">
                <h2>Select a Suite to Test</h2>
                <div class="suite-grid" id="run-suite-grid"></div>
                <div id="run-empty-msg" class="empty-state hidden">
                    <p>No suites found. Go to "Manage Suites" to create or import one!</p>
                </div>
            </div>
            
            <div id="active-test-section" class="hidden">
                <div class="header-row">
                    <h2><button class="btn-outline" onclick="showPicker()">⬅ Back</button> <span id="active-suite-name"></span></h2>
                    <button class="btn-primary" onclick="generateReport()">Generate JIRA Report</button>
                </div>
                <div id="test-container"></div>
                <textarea id="jira-output" readonly></textarea>
            </div>
        </div>

        <div id="view-suites" class="view">
            <div class="header-row">
                <h2>Test Suites</h2>
                <div class="header-actions">
                    <button class="btn-primary" onclick="showSuiteEditor()">+ New Suite</button>
                    <button class="btn-outline" onclick="document.getElementById('import-suite-file').click()">📥 Import</button>
                    <input type="file" id="import-suite-file" accept=".json" style="display: none;" onchange="importSingleSuite(event)">
                </div>
            </div>
            
            <div id="suite-list"></div>

            <div class="card" id="suite-editor" style="display: none;">
                <h3>Suite Builder</h3>
                <input type="text" id="edit-suite-name" placeholder="Suite Name (e.g. Checkout Flow)" class="main-input">
                <input type="hidden" id="edit-suite-id">
                
                <div id="editor-items-list"></div>
                
                <div class="editor-footer">
                    <button class="btn-outline" onclick="addLine()">+ Add Step</button>
                    <div style="float: right;">
                        <button class="btn-primary" onclick="saveSuite()">Save Suite</button>
                        <button class="btn-outline" onclick="hideSuiteEditor()">Cancel</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-history" class="view">
            <h2>Run History</h2>
            <div id="history-list"></div>
        </div>

        <div id="view-settings" class="view">
            <h2>Settings & Backup</h2>
            <div class="card">
                <h3>Global Backup</h3>
                <p>Download or restore all suites and history at once.</p>
                <div style="margin-top:15px; display:flex; gap:10px;">
                    <button class="btn-primary" onclick="exportData()">Export Everything</button>
                    <button class="btn-outline" onclick="document.getElementById('import-file').click()">Restore Everything</button>
                </div>
                <input type="file" id="import-file" accept=".json" style="display: none;" onchange="importData(event)">
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
